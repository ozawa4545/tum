<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pop Tsum - Image Fixed Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@800&display=swap');
        body { margin: 0; background: #a1c4fd; font-family: 'M PLUS Rounded 1c', sans-serif; display: flex; flex-direction: column; align-items: center; overflow: hidden; height: 100vh; user-select: none; touch-action: none; }
        
        #init-overlay { position: fixed; inset: 0; background: #a1c4fd; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 5000; color: white; cursor: pointer; }
        #fever-bg { position: fixed; inset: 0; background: linear-gradient(180deg, #ff9a9e, #fecfef); opacity: 0; transition: opacity 0.5s; z-index: -1; }
        .fever-active #fever-bg { opacity: 1; }
        
        #home-screen { position: fixed; inset: 0; background: linear-gradient(180deg, #74ebd5, #9face6); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        .char-item-box { width: 70px; height: 70px; border-radius: 50%; border: 4px solid #fff; cursor: pointer; margin: 8px; background: white; overflow: hidden; transition: 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.1); position: relative; }
        .char-item-box.selected { border-color: #2196F3; transform: scale(1.15); box-shadow: 0 0 20px white; }
        .char-label { position: absolute; bottom: 5px; width: 100%; text-align: center; color: #333; font-weight: bold; font-size: 14px; text-shadow: 1px 1px 0 white; }

        .btn-start { background: #2196F3; color: white; border: none; padding: 18px 70px; font-size: 26px; border-radius: 50px; cursor: pointer; font-family: inherit; box-shadow: 0 6px 0 #1976D2; margin-top: 30px; }
        #game-header { position: absolute; width: 380px; top: 15px; display: none; flex-direction: column; align-items: flex-start; z-index: 500; pointer-events: none; padding: 0 15px; box-sizing: border-box;}
        .stat-panel { background: rgba(255,255,255,0.9); padding: 6px 16px; border-radius: 20px; color: #1976D2; border: 3px solid #fff; font-size: 18px; pointer-events: auto; box-shadow: 0 4px 0 rgba(0,0,0,0.05); font-weight: 800; margin-bottom: 5px;}
        
        #fever-gauge-wrap { position: absolute; bottom: 30px; width: 200px; height: 18px; background: rgba(255,255,255,0.4); border: 3px solid #fff; border-radius: 15px; overflow: hidden; display: none; z-index: 500; left: 50%; transform: translateX(-50%); }
        #fever-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #ffeb3b, #f44336); }
        
        .bottom-btn { width: 85px; height: 85px; border-radius: 50%; border: 4px solid #fff; position: absolute; cursor: pointer; display: none; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 14px; z-index: 999; box-shadow: 0 4px 8px rgba(0,0,0,0.3); }
        #skill-btn-container { left: 20px; bottom: 20px; background: #555; overflow: hidden; }
        #skill-gauge { position: absolute; bottom: 0; width: 100%; height: 0%; background: #ff9800; transition: height 0.3s; z-index: -1; }
        #skill-btn-container.ready { background: #e65100; animation: pulse 0.8s infinite alternate; }
        #shuffle-btn { right: 20px; bottom: 20px; background: #4caf50; }
        
        #start-overlay { position: fixed; inset: 0; display: none; justify-content: center; align-items: center; font-size: 60px; color: #fff; z-index: 2000; background: rgba(0,0,0,0.3); font-weight: bold; }
        #result-screen { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 3000; color: white; }
        
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.1); } }
    </style>
</head>
<body>

<div id="init-overlay" onclick="initializeGame()">
    <h1 style="font-size: 40px; margin-bottom: 10px;">ツムツム</h1>
    <div style="animation: blink 1s infinite alternate;">タップして画像読み込み</div>
</div>

<div id="fever-bg"></div>
<div id="start-overlay">READY</div>

<div id="home-screen">
    <h1 style="color:white; font-size: 32px; text-shadow: 2px 2px 0 #1976D2;">ツムを選択</h1>
    <div id="selector" style="display:flex; flex-wrap: wrap; justify-content: center; margin-bottom: 20px;"></div>
    <div style="background: white; padding: 15px; border-radius: 15px; font-size: 14px; width: 280px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
        <b>【T3スキル】全ツムをマイツムに変化！</b>
    </div>
    <button class="btn-start" onclick="readyGoSequence()">START!</button>
</div>

<div id="game-header">
    <div class="stat-panel">SCORE: <span id="score-val">0</span></div>
    <div class="stat-panel">TIME: <span id="time-val">60</span></div>
</div>

<div id="fever-gauge-wrap"><div id="fever-bar"></div></div>
<div id="skill-btn-container" class="bottom-btn" onclick="triggerSkill()"><div id="skill-gauge"></div><div style="z-index: 10;">SKILL</div></div>
<div id="shuffle-btn" class="bottom-btn" onclick="triggerShuffle()">SHUFFLE</div>

<div id="result-screen">
    <div id="result-rank" style="font-size: 60px;">-</div>
    <div id="result-score" style="font-size: 30px; margin: 20px 0;">0</div>
    <button class="btn-start" onclick="location.reload()" style="padding: 10px 40px;">HOME</button>
</div>

<div id="container"></div>

<script>
let game, score = 0, time = 60, playing = false, myTsumIdx = 1;
let fever = 0, isFever = false, skill = 0, canShuffle = true;
let scoreMultiplier = 1;
const SKILL_MAX = 100;
const COLORS = [0x2196F3, 0x4CAF50, 0xFFEB3b, 0xFF9800, 0x9C27B0];

function initializeGame() {
    document.getElementById('init-overlay').style.display = 'none';
    document.getElementById('home-screen').style.display = 'flex';
    if(!game) runPhaser();
}

function runPhaser() {
    const config = {
        type: Phaser.AUTO,
        width: 380,
        height: 550,
        parent: 'container',
        transparent: true,
        physics: { default: 'arcade', arcade: { gravity: { y: 2500 } } },
        scene: { preload: preload, create: create, update: update }
    };
    game = new Phaser.Game(config);
}

function preload() {
    // 外部画像の読み込み (T1-T5)
    for(let i=1; i<=5; i++) {
        this.load.image(`tsum${i}`, `tsum${i}.png`);
    }

    // 【重要】もし画像が読み込めなかった時のための「黒くならない」保険用テクスチャ生成
    this.load.on('loaderror', (file) => {
        console.warn('Image load error:', file.key);
        let idx = parseInt(file.key.replace('tsum','')) - 1;
        let g = this.make.graphics({x:0, y:0, add:false});
        g.fillStyle(COLORS[idx], 1);
        g.fillCircle(32, 32, 32);
        g.generateTexture(file.key, 64, 64);
    });
}

function create() {
    const scene = this;
    const selector = document.getElementById('selector');
    
    for(let i=1; i<=5; i++) {
        const box = document.createElement('div');
        box.className = 'char-item-box' + (i === 1 ? ' selected' : '');
        
        // セレクター用のプレビュー画像
        const img = document.createElement('img');
        img.src = `tsum${i}.png`;
        img.style.width = '100%';
        img.style.height = '100%';
        img.onerror = () => { box.style.backgroundColor = '#' + COLORS[i-1].toString(16); }; // 画像がない時の色
        
        const label = document.createElement('div');
        label.className = 'char-label';
        label.innerText = 'T' + i;

        box.appendChild(img);
        box.appendChild(label);
        box.onclick = () => { 
            myTsumIdx = i; 
            document.querySelectorAll('.char-item-box').forEach(el => el.classList.remove('selected')); 
            box.classList.add('selected'); 
        };
        selector.appendChild(box);
    }

    this.tsums = this.physics.add.group({ bounceX: 0.1, bounceY: 0.1, collideWorldBounds: true });
    this.physics.add.collider(this.tsums, this.tsums);
    this.line = this.add.graphics();
    this.selected = [];

    // タイマー
    this.time.addEvent({ delay: 1000, callback: () => { 
        if(playing) { 
            time--; 
            document.getElementById('time-val').innerText = time;
            if(time <= 0) { playing = false; showResult(); }
        }
    }, loop: true });

    // タッチ操作
    this.input.on('pointerdown', (p, targets) => { if(targets[0] && playing) { this.selected = [targets[0]]; targets[0].setTint(0xaaaaaa); } });
    this.input.on('pointermove', (p, targets) => {
        if(!this.selected.length || !playing) return;
        const last = this.selected[this.selected.length-1];
        if(targets[0]) {
            const curr = targets[0];
            const dist = Phaser.Math.Distance.Between(last.x, last.y, curr.x, curr.y);
            if(!this.selected.includes(curr) && curr.texture.key === last.texture.key && dist < 85) {
                this.selected.push(curr); curr.setTint(0xaaaaaa);
            }
        }
    });
    this.input.on('pointerup', () => {
        if(!playing) return;
        if(this.selected.length >= 3) {
            handlePop(this.selected);
        } else {
            this.selected.forEach(t => t.clearTint());
        }
        this.selected = [];
    });
}

function spawn(scene) {
    const i = Math.floor(Math.random() * 5) + 1;
    const t = scene.tsums.create(Phaser.Math.Between(50, 330), -50, 'tsum' + i);
    t.setDisplaySize(65, 65);
    t.setCircle(30 * (t.texture.width / 65)); // 当たり判定を画像サイズに合わせる
    t.setInteractive();
}

function handlePop(list) {
    let pts = list.length * 100;
    if(list[0].texture.key === 'tsum' + myTsumIdx) {
        skill = Math.min(skill + list.length * 6, SKILL_MAX);
        updateSkillUI();
    }
    score += Math.floor(pts * (isFever ? 3 : 1) * scoreMultiplier);
    document.getElementById('score-val').innerText = score.toLocaleString();
    
    fever = Math.min(fever + list.length * 5, 100);
    document.getElementById('fever-bar').style.width = fever + "%";
    if(fever >= 100 && !isFever) activateFever();

    const scene = list[0].scene;
    list.forEach(t => { t.destroy(); spawn(scene); });
}

function activateFever() {
    isFever = true; document.body.classList.add('fever-active');
    setTimeout(() => { isFever = false; fever = 0; document.body.classList.remove('fever-active'); }, 10000);
}

function updateSkillUI() {
    document.getElementById('skill-gauge').style.height = skill + "%";
    const btn = document.getElementById('skill-btn-container');
    if(skill >= SKILL_MAX) btn.classList.add('ready'); else btn.classList.remove('ready');
}

function triggerSkill() {
    if(skill < SKILL_MAX || !playing) return;
    skill = 0; updateSkillUI();
    const scene = game.scene.scenes[0];
    const overlay = document.getElementById('start-overlay');
    overlay.style.display = 'flex'; overlay.style.fontSize = '30px';

    if(myTsumIdx === 1) { scoreMultiplier = 100; overlay.innerText = "SCORE x100!"; setTimeout(()=>scoreMultiplier=1, 10000); }
    else if(myTsumIdx === 2) { /* スキル2: 特殊消去等の処理 */ overlay.innerText = "SKILL ACTIVATED!"; }
    else if(myTsumIdx === 3) { 
        overlay.innerText = "MY TSUM CHANGE!"; 
        scene.tsums.getChildren().forEach(t => {
            t.setTexture('tsum' + myTsumIdx);
            t.setDisplaySize(65,65);
        }); 
    }
    else if(myTsumIdx === 4) { score += 100000; overlay.innerText = "+100,000 PTS!"; }
    else if(myTsumIdx === 5) { activateFever(); overlay.innerText = "EXTRA FEVER!"; }

    setTimeout(() => overlay.style.display = 'none', 1000);
}

function triggerShuffle() {
    if(!canShuffle || !playing) return;
    canShuffle = false; document.getElementById('shuffle-btn').style.opacity = "0.5";
    game.scene.scenes[0].tsums.getChildren().forEach(t => { t.setVelocity(Phaser.Math.Between(-600, 600), -1000); });
    setTimeout(() => { canShuffle = true; document.getElementById('shuffle-btn').style.opacity = "1"; }, 3000);
}

function readyGoSequence() {
    document.getElementById('home-screen').style.display = 'none';
    const scene = game.scene.scenes[0];
    scene.tsums.clear(true, true);
    for(let i=0; i<50; i++) spawn(scene);
    
    const overlay = document.getElementById('start-overlay');
    overlay.style.display = 'flex'; overlay.innerText = "READY";
    setTimeout(() => {
        overlay.innerText = "GO!";
        setTimeout(() => { overlay.style.display = 'none'; playing = true; }, 500);
    }, 1200);
}

function showResult() {
    document.getElementById('result-screen').style.display = 'flex';
    document.getElementById('result-score').innerText = "SCORE: " + score.toLocaleString();
    document.getElementById('result-rank').innerText = score > 1000000 ? "神" : score > 300000 ? "達人" : "修行中";
}

function update() {
    if(!playing) return;
    document.getElementById('game-header').style.display = 'flex';
    document.getElementById('fever-gauge-wrap').style.display = 'block';
    document.getElementById('skill-btn-container').style.display = 'flex';
    document.getElementById('shuffle-btn').style.display = 'flex';
    this.line.clear();
    if(this.selected.length > 1) {
        this.line.lineStyle(6, 0xffffff, 0.7);
        this.line.beginPath().moveTo(this.selected[0].x, this.selected[0].y);
        this.selected.forEach(t => this.line.lineTo(t.x, t.y));
        this.line.strokePath();
    }
}
</script>
</body>
</html>
